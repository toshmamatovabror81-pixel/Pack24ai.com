name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Run Jest
        run: npm test -- --ci --coverage --maxWorkers=2

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Yarim-soft mode: pre-existing leaks (P0.1 docs) ham logga chiqsin
          config-path: .gitleaks.toml
        continue-on-error: false

  migrate-validate:
    name: Prisma migrate validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: pack24_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/pack24_ci?schema=public
          DIRECT_URL: postgresql://ci:ci@localhost:5432/pack24_ci?schema=public
        run: |
          npx prisma migrate deploy
          npx prisma validate

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        env:
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci_dummy?schema=public'
          DIRECT_URL: 'postgresql://ci:ci@localhost:5432/ci_dummy?schema=public'
          AUTH_SECRET: 'ci-dummy-secret-32-characters-long-abc'
          NEXTAUTH_SECRET: 'ci-dummy-secret-32-characters-long-abc'
          NEXTAUTH_URL: 'http://localhost:3000'
          ADMIN_SECRET: 'ci-dummy-admin-secret-32-characters-x'
          DRIVER_TOKEN_SECRET: 'ci-dummy-driver-secret-32-characters'
        run: npm run build

      - name: Run Playwright
        env:
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci_dummy?schema=public'
          ADMIN_SECRET: 'ci-dummy-admin-secret-32-characters-x'
        run: |
          npm run start &
          npx wait-on http://localhost:3000
          PLAYWRIGHT_NO_SERVER=1 npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        env:
          # Build vaqtidagi env'lar — dummies, runtime'da haqiqiy qiymatlar bo'ladi
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci_dummy?schema=public'
          DIRECT_URL: 'postgresql://ci:ci@localhost:5432/ci_dummy?schema=public'
          AUTH_SECRET: 'ci-dummy-secret-32-characters-long-abc'
          NEXTAUTH_SECRET: 'ci-dummy-secret-32-characters-long-abc'
          NEXTAUTH_URL: 'http://localhost:3000'
          ADMIN_SECRET: 'ci-dummy-admin-secret-32-characters-x'
          DRIVER_TOKEN_SECRET: 'ci-dummy-driver-secret-32-characters'
          GIT_COMMIT_SHA: ${{ github.sha }}
        run: npm run build
